<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مسابقة المسيري القرآنية</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri&family=Cairo:wght@400;700;900&display=swap');
        
        :root { --navy: #020617; --gold: #bf953f; --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --input: #f8fafc; }
        [data-theme="dark"] { --bg: #000000; --card: #111827; --text: #f9fafb; --navy: #000000; --input: #1f2937; }

        * { box-sizing: border-box; outline: none; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; text-align: center; overflow-x: hidden; }

        /* الأنيميشن الأصلي للملف */
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .animate { animation: slideUp 0.6s ease-out forwards; }

        header { background: var(--navy); padding: 60px 20px 120px; border-bottom: 5px solid var(--gold); border-bottom-left-radius: 120px; border-bottom-right-radius: 120px; position: relative; }
        header h1 { font-family: 'Amiri', serif; font-size: 3.5rem; color: var(--gold); margin: 0; }

        .theme-btn { position: fixed; top: 15px; left: 15px; z-index: 1000; background: var(--gold); border: none; width: 45px; height: 45px; border-radius: 15px; cursor: pointer; color: white; }

        .container { max-width: 480px; margin: -80px auto 0; padding: 0 20px; position: relative; z-index: 100; }
        .main-card { background: var(--card); border-radius: 70px; padding: 45px 30px; box-shadow: 0 40px 100px rgba(0,0,0,0.2); }

        .ad-card { background: var(--card); border-radius: 50px; border: 2.5px solid var(--gold); margin-bottom: 25px; overflow: hidden; text-align: right; }
        .ad-img { width: 100%; height: 220px; object-fit: cover; }
        .ad-body { padding: 25px; }

        input { width: 100%; padding: 20px; border-radius: 30px; border: 2px solid #e5e7eb; background: var(--input); color: var(--text); text-align: center; font-size: 1.1rem; margin-bottom: 15px; font-weight: 700; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), #8a6e2f); color: #fff; width: 100%; padding: 22px; border-radius: 50px; font-weight: 900; border: none; cursor: pointer; font-size: 1.2rem; }
        .btn-outline { background: transparent; border: 2.5px solid var(--gold); color: var(--gold); margin-top: 15px; }

        .msg-bubble { background: var(--navy); color: var(--gold); padding: 15px 20px; border-radius: 25px 25px 0 25px; margin-bottom: 12px; text-align: right; position: relative; }
        .u-photo { width: 120px; height: 120px; border-radius: 40px; border: 4px solid var(--gold); object-fit: cover; margin-bottom: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body data-theme="light">

    <button class="theme-btn" onclick="toggleTheme()">🌓</button>

    <header>
        <h1 class="animate">مسابقة المسيري</h1>
        <p class="animate" style="color:white">نسخة عام 2024</p>
    </header>

    <div class="container animate">
        <div id="adsArea"></div>

        <div class="main-card">
            <div id="vHome">
                <button class="btn-gold" onclick="nav('Reg')">تقديم طلب جديد 📝</button>
                <button class="btn-gold btn-outline" onclick="nav('Track')">استعلام برقم الطلب 🔍</button>
                <button class="btn-gold btn-outline" onclick="nav('Login')">دخول المتسابقين 🛡️</button>
            </div>

            <div id="vReg" class="hidden">
                <input id="rn" placeholder="الاسم الرباعي للمتسابق">
                <input id="rp" type="tel" placeholder="رقم واتساب التواصل">
                <input id="rt" placeholder="اسم الشيخ المحفظ">
                <input id="rd" placeholder="اسم الدار أو المسجد">
                <input id="ra" placeholder="مستوى الحفظ الحالي">
                <div style="font-size: 0.8rem; color: var(--gold); margin-bottom: 10px;">ارفق صورة شخصية واضحة</div>
                <input type="file" id="ri" accept="image/*">
                <button class="btn-gold" id="subBtn" onclick="hReg()">إرسال البيانات سحابياً 🚀</button>
                <button class="btn-gold btn-outline" onclick="location.reload()">رجوع</button>
            </div>

            <div id="vSuccess" class="hidden">
                <div style="padding:20px; border:3px dashed var(--gold); border-radius:40px;">
                    <h2 style="color:var(--gold)">تم التسجيل بنجاح!</h2>
                    <p>رقم استعلامك (هام جداً):</p>
                    <h1 id="showId" style="letter-spacing:5px; font-size:3rem;">------</h1>
                </div>
                <button class="btn-gold" style="margin-top:20px" onclick="location.reload()">الرئيسية</button>
            </div>

            <div id="vTrack" class="hidden">
                <input type="number" id="ti" placeholder="ادخل الرقم المكون من 6 أرقام">
                <button class="btn-gold" onclick="hTrack()">البحث عن الحالة</button>
                <div id="tRes" style="margin-top:20px; font-weight:bold;"></div>
                <button class="btn-gold btn-outline" onclick="location.reload()">رجوع</button>
            </div>

            <div id="vLogin" class="hidden">
                <input id="ui" type="number" placeholder="رقم المستخدم">
                <input id="pi" type="number" placeholder="كلمة المرور">
                <button class="btn-gold" onclick="hLogin()">دخول للملف</button>
                <button class="btn-gold btn-outline" onclick="location.reload()">رجوع</button>
            </div>

            <div id="vProfile" class="hidden">
                <img src="" id="uPh" class="u-photo">
                <h2 id="uNm"></h2>
                <div id="uChatArea" style="max-height:300px; overflow-y:auto; padding:10px;"></div>
                <button class="btn-gold btn-outline" onclick="location.reload()">تسجيل الخروج</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC1F8gKvyvyYYr0pYjIabhulUdP720_Eig",
        authDomain: "my-chat-ad03e.firebaseapp.com",
        databaseURL: "https://my-chat-ad03e-default-rtdb.firebaseio.com",
        projectId: "my-chat-ad03e",
        storageBucket: "my-chat-ad03e.firebasestorage.app",
        messagingSenderId: "32351043149",
        appId: "1:32351043149:web:e2dd0dd8654c1569cea604"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let students = {};

    function toggleTheme() {
        const b = document.body;
        b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    function nav(v) {
        document.querySelectorAll('.main-card > div').forEach(d=>d.classList.add('hidden'));
        document.getElementById('v'+v).classList.remove('hidden');
    }

    db.ref('/').on('value', s => {
        const data = s.val();
        students = data?.students || {};
        const area = document.getElementById('adsArea'); area.innerHTML = "";
        if(data?.ads) {
            Object.values(data.ads).reverse().forEach(ad => {
                area.innerHTML += `<div class="ad-card animate">${ad.img?`<img src="${ad.img}" class="ad-img">`:''}<div class="ad-body"><h3>${ad.title}</h3><p>${ad.desc}</p></div></div>`;
            });
        }
    });

    async function hReg() {
        const n=document.getElementById('rn').value, p=document.getElementById('rp').value, i=document.getElementById('ri').files;
        if(!n || !p) return alert('برجاء كتابة الاسم والرقم');
        
        const btn = document.getElementById('subBtn'); btn.innerText = "جاري الحفظ...⏳"; btn.disabled = true;
        const id = Math.floor(100000 + Math.random() * 900000);
        let img = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

        try {
            if(i.length > 0) {
                const fd = new FormData(); fd.append('image', i[0]);
                const res = await fetch('https://api.imgbb.com/1/upload?key=7acb7d0d03189ae4b12c2924d296cc37', {method:'POST', body:fd});
                const d = await res.json(); img = d.data.url;
            }
            await db.ref('students/'+id).set({
                name:n, ph:p, teacher:document.getElementById('rt').value,
                dar:document.getElementById('rd').value, parts:document.getElementById('ra').value,
                photo:img, st:'P', chat:[{txt:'تم استقبال طلبك بنجاح ونحن الآن في مرحلة المراجعة.'}]
            });
            document.getElementById('showId').innerText = id;
            nav('Success');
        } catch(e) { alert('خطأ في الشبكة'); btn.disabled = false; }
    }

    function hTrack() {
        const s = students[document.getElementById('ti').value];
        const res = document.getElementById('tRes');
        if(s) {
            if(s.st==='A') res.innerHTML = `<div style="color:#059669">مقبول ✅<br>اليوزر: ${s.user}<br>الباسورد: ${s.pass}</div>`;
            else if(s.st==='R') res.innerHTML = `<div style="color:#dc2626">نعتذر، الطلب مرفوض ❌</div>`;
            else res.innerHTML = `<div style="color:var(--gold)">تحت المراجعة ⏳</div>`;
        } else alert('الرقم غير موجود');
    }

    function hLogin() {
        const u=document.getElementById('ui').value, p=document.getElementById('pi').value;
        const id = Object.keys(students).find(k => students[k].user == u && students[k].pass == p);
        if(id) {
            const s = students[id]; nav('Profile');
            document.getElementById('uPh').src = s.photo;
            document.getElementById('uNm').innerText = s.name;
            const chatBox = document.getElementById('uChatArea'); chatBox.innerHTML = "";
            (s.chat || []).forEach(m => chatBox.innerHTML += `<div class="msg-bubble animate">${m.txt}</div>`);
        } else alert('بيانات خاطئة');
    }
</script>
</body>
</html>
